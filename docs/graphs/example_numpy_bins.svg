  <text x="68" y="72" text-anchor="end" class="label">1600</text>
  <text x="38" y="158" text-anchor="middle" class="label" transform="rotate(-90 38 158)">MiB/s</text>
  <rect x="124" y="193.1" width="92" height="46.9" class="bar-before"/>
  <text x="170" y="187.1" text-anchor="middle" class="label">447</text>
  <rect x="284" y="94.7" width="92" height="145.3" class="bar-pyuring"/>
  <text x="330" y="88.7" text-anchor="middle" class="label">1384</text>
